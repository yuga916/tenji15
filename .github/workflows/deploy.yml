name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # ボートレースはモーニング(8時台)〜ミッドナイト(23時前)まで毎日開催。
    # 開催時間帯(JST 8:00-23:00 = UTC 23:00-14:00)は5分ごとに直前更新
    # (シグナルの鮮度確保。番組表の取得は20分に1回に抑制済み)、
    # それ以外は朝の番組確定にあわせ1日1回。
    - cron: "*/5 23 * * *"
    - cron: "*/5 0-14 * * *"
    - cron: "30 21 * * *"
  workflow_dispatch:

permissions:
  contents: write   # data/days(答え合わせアーカイブ)をコミットして蓄積するため
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # OfficialDataSource実装後に 'official' へ(Settings > Variables)
      DATA_SOURCE_MODE: ${{ vars.DATA_SOURCE_MODE || 'mock' }}
      # 直前シグナル(展示・オッズ反映)。'official-live' で有効化(Settings > Variables)
      SIGNALS_MODE: ${{ vars.SIGNALS_MODE || 'off' }}
      GA_MEASUREMENT_ID: ${{ vars.GA_MEASUREMENT_ID }}
      SITE_URL: ${{ vars.SITE_URL || format('https://{0}.github.io/{1}', github.repository_owner, github.event.repository.name) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # LZH解凍ツール(officialモードで公式配布ファイルの解凍に使用)
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq lhasa
      - run: npm run test:parser
      - run: npm run pipeline
      # X自動ポスト(Secrets未設定なら自動スキップ・失敗してもデプロイ継続)
      - name: X auto post
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: node --experimental-strip-types src/xPost.ts || echo "::warning::Xポスト失敗(継続)"
      # 日別データ(答え合わせアーカイブ)をリポジトリへコミットして蓄積。
      # [skip ci]でこのpushによる再実行ループを防ぐ。失敗してもデプロイは継続。
      - name: Commit data archive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A data 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "data: 自動更新 $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]"
            git pull --rebase origin main || true
            git push origin main || echo "::warning::データのpushに失敗(次回リトライ)"
          fi
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
      # IndexNow: Bing(=ChatGPT検索が使うインデックス)へ更新を通知。
      # 5分ごとのデプロイ全部で送るとスパム的なので、朝の番組確定ビルド(21:30 UTC)のみ。
      - name: Notify IndexNow (daily)
        if: github.event.schedule == '30 21 * * *'
        run: |
          curl -s https://kyotei-chokuzen.com/sitemap.xml -o sitemap.xml || exit 0
          URLS=$(grep -o '<loc>[^<]*</loc>' sitemap.xml | sed 's/<[^>]*>//g' | head -500 | sed 's/.*/"&"/' | paste -sd, -)
          cat > payload.json <<EOF
          {"host":"kyotei-chokuzen.com","key":"8f3c1e7a2b9d4f6e0a5c8b1d7e3f9a24","keyLocation":"https://kyotei-chokuzen.com/8f3c1e7a2b9d4f6e0a5c8b1d7e3f9a24.txt","urlList":[${URLS}]}
          EOF
          curl -s -X POST "https://api.indexnow.org/indexnow" -H "Content-Type: application/json; charset=utf-8" --data @payload.json -w "\nIndexNow HTTP %{http_code}\n" || echo "::warning::IndexNow通知失敗(継続)"
