name: History Backfill

on:
  schedule:
    # 深夜3:10 JST(=18:10 UTC)に1日1回、過去分の競走成績を40日分ずつ遡って集計。
    # 3年分(約1100日)は1ヶ月弱で完了し、以後は自動で何もしなくなる。
    - cron: "10 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

# デプロイ側のdataコミットと競合しないよう順番待ちにする
concurrency:
  group: backfill
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq lhasa
      - name: Run backfill
        env:
          BACKFILL_DAYS: "40"
          HISTORY_YEARS: "3"
        run: node --experimental-strip-types src/backfill.ts
      - name: Commit history aggregate
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A data/history 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "data: 過去分バックフィル $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]"
            for i in 1 2 3; do
              git pull --rebase origin main && git push origin main && break
              echo "push retry $i"; sleep 10
            done
          fi
