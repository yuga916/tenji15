name: Restore Day Data

on:
  workflow_dispatch:
    inputs:
      date:
        description: "復元する日付 (YYYY-MM-DD)"
        required: true
      force:
        description: "既存データがあっても上書きする (1=有効)"
        required: false
        default: "0"

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq lhasa
      - name: Restore day
        env:
          RESTORE_DATE: ${{ inputs.date }}
          FORCE: ${{ inputs.force }}
        run: node --experimental-strip-types src/restoreDay.ts
      - name: Commit restored data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A data 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "data: ${{ inputs.date }} を公式アーカイブから復元"
            git pull --rebase origin main
            git push origin main
          fi
